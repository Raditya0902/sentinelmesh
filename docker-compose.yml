volumes:
  logs:
  chromadb_data:

services:
  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    restart: always

  lobstertrap:
    build:
      context: .
      dockerfile: lobstertrap/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - logs:/app/logs
    environment:
      - BACKEND_URL=${LLM_BACKEND_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - lobstertrap
      - chromadb
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LOBSTER_TRAP_URL=http://lobstertrap:8080
      - AUDIT_LOG_PATH=logs/audit.jsonl
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - logs:/app/logs
    restart: always

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api
      - lobstertrap
    environment:
      - API_URL=http://api:8000
      - LOBSTER_TRAP_URL=http://lobstertrap:8080
      - AUDIT_LOG_PATH=logs/audit.jsonl
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - logs:/app/logs
    restart: always
