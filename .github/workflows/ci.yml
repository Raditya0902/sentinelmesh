name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-lobstertrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: lobstertrap/go.sum
          
      - name: Run Go tests
        working-directory: ./lobstertrap
        run: go test ./... -v
        
      - name: Build Lobster Trap
        working-directory: ./lobstertrap
        run: go build -o lobstertrap .

      - name: Run Policy Tests
        run: ./lobstertrap/lobstertrap test --policy proxy/policy.yaml

      - name: Upload lobstertrap binary
        uses: actions/upload-artifact@v4
        with:
          name: lobstertrap-binary
          path: lobstertrap/lobstertrap
          retention-days: 1

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Python tests
        run: |
          PYTHONPATH=. pytest tests/test_rbac.py tests/test_pipeline.py
          PYTHONPATH=. python tests/run_attacks.py

  test-attacks-stack:
    runs-on: ubuntu-latest
    needs: [test-lobstertrap]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download lobstertrap binary
        uses: actions/download-artifact@v4
        with:
          name: lobstertrap-binary
          path: lobstertrap/

      - name: Make binary executable
        run: chmod +x lobstertrap/lobstertrap

      - name: Start stack (no LLM backend)
        run: |
          cp .env.example .env
          docker compose up -d chromadb lobstertrap api
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: Run attack suite with live proxy
        run: PYTHONPATH=. REQUIRE_PROXY=1 SKIP_LLM_TESTS=1 python tests/run_attacks.py

      - name: Stop stack
        if: always()
        run: docker compose down
