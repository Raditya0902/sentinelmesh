name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-lobstertrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: lobstertrap/go.sum
          
      - name: Run Go tests
        working-directory: ./lobstertrap
        run: go test ./... -v
        
      - name: Build Lobster Trap
        working-directory: ./lobstertrap
        run: go build -o lobstertrap .
        
      - name: Run Policy Tests
        run: ./lobstertrap/lobstertrap test --policy proxy/policy.yaml

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Python tests
        run: |
          PYTHONPATH=. pytest tests/test_rbac.py tests/test_pipeline.py
